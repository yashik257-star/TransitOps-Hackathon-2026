<h1>Driver Management</h1>

<div class="vehicle-form">

<h2>Add New Driver</h2>

<label>Driver Name</label>
<input type="text" id="dname" placeholder="Enter Driver Name">

<label>Phone Number</label>
<input type="text" id="dphone" placeholder="Enter Phone Number">

<label>License Number</label>
<input type="text" id="dlicense" placeholder="Enter License Number">

<label>Assigned Vehicle</label>
<input type="text" id="dvehicle" placeholder="Example: TR101">

<button onclick="addDriver()">Add Driver</button>

</div>

<br>

<table id="driverTable">

<tr>
<th>Driver Name</th>
<th>Phone</th>
<th>License</th>
<th>Assigned Vehicle</th>
<th>Action</th>
</tr>

</table>
